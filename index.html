<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa — Colegio San Francisco de Asís</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ECEFF1; color: #212121;
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      background: #1565C0; color: #fff;
      padding: 10px 18px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.35); z-index: 20; flex-shrink: 0;
    }
    .brand .title { font-size: 17px; font-weight: 700; }
    .brand .sub   { font-size: 11px; opacity: .78; margin-top: 1px; }
    .search-wrap { position: relative; flex: 1; max-width: 420px; margin-left: auto; }
    .s-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; pointer-events: none; opacity: .65;
    }
    #search {
      width: 100%; padding: 9px 14px 9px 35px;
      border-radius: 22px; border: none; font-size: 14px; outline: none;
      background: rgba(255,255,255,.18); color: #fff; transition: background .2s;
    }
    #search::placeholder { color: rgba(255,255,255,.55); }
    #search:focus { background: #fff; color: #212121; }
    #sugs {
      display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #fff; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,.22);
      overflow: hidden; z-index: 100;
    }
    #sugs.open { display: block; }
    .si {
      padding: 11px 15px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      font-size: 13.5px; color: #222; border-bottom: 1px solid #f0f0f0;
    }
    .si:last-child { border-bottom: none; }
    .si:hover { background: #E3F2FD; }
    .si-badge {
      background: #1565C0; color: #fff; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px; min-width: 32px; text-align: center;
    }
    .floor-bar {
      background: #fff; border-bottom: 1px solid #CFD8DC;
      padding: 7px 16px; display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }
    .floor-bar span { font-size: 12px; color: #666; margin-right: 4px; }
    .fbtn {
      padding: 4px 15px; border-radius: 18px; border: 2px solid #1565C0;
      color: #1565C0; font-weight: 600; font-size: 12px; cursor: pointer; background: #fff;
    }
    .fbtn.active { background: #1565C0; color: #fff; }
    .fbtn:disabled { opacity: .35; cursor: default; border-color: #90A4AE; color: #90A4AE; }
    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .map-wrap {
      flex: 1; overflow: auto; background: #ECEFF1; padding: 16px;
      display: flex; align-items: flex-start; justify-content: flex-start;
    }
    .floor-svg { min-width: 1150px; cursor: default; filter: drop-shadow(0 4px 20px rgba(0,0,0,.18)); display: none; }
    .floor-svg.active { display: block; }

    .clickable { cursor: pointer; }
    .clickable:hover .rf { filter: brightness(.84); }
    .highlight .rf { fill: #FFC107 !important; }

    .route-line {
      fill: none; stroke: #E53935; stroke-width: 5;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 14 8; animation: march .65s linear infinite;
    }
    @keyframes march { to { stroke-dashoffset: -22; } }
    .m-start { fill: #43A047; }
    .m-end   { fill: #E53935; }
    .m-pulse {
      fill: none; stroke: #E53935; stroke-width: 3; opacity: 0;
      animation: pulse 1.5s ease-out infinite;
    }
    @keyframes pulse { 0%{r:10;opacity:.7} 100%{r:28;opacity:0} }

    .sidebar {
      width: 285px; background: #fff;
      border-left: 1px solid #CFD8DC;
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sb-head { background: #1565C0; color: #fff; padding: 12px 16px; font-weight: 600; font-size: 14px; flex-shrink: 0; }
    .sb-body { flex: 1; overflow-y: auto; padding: 13px; }
    .empty { color: #9E9E9E; font-size: 13px; text-align: center; margin-top: 36px; line-height: 1.65; }
    .step { display: flex; gap: 10px; margin-bottom: 13px; align-items: flex-start; }
    .snum { width: 29px; height: 29px; border-radius: 50%; flex-shrink: 0; background: #1565C0; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .snum.start { background: #43A047; }
    .snum.dest  { background: #E53935; }
    .sbody { font-size: 12.5px; line-height: 1.5; color: #424242; padding-top: 4px; }
    .sbody strong { color: #111; display: block; margin-bottom: 2px; }
    .sdiv { height: 1px; background: #ECEFF1; margin: 2px 0 13px; }
    .photo-wrap { flex-shrink: 0; border-top: 1px solid #ECEFF1; padding: 12px; display: none; }
    .photo-wrap h4 { font-size: 11px; color: #90A4AE; margin-bottom: 7px; text-transform: uppercase; letter-spacing: .4px; }
    .photo-wrap img { width: 100%; border-radius: 8px; object-fit: cover; max-height: 150px; }
    @media (max-width: 768px) {
      .main { flex-direction: column-reverse; }
      .sidebar { width: 100%; max-height: 220px; border-left: none; border-top: 1px solid #CFD8DC; }
    }
  </style>
</head>
<body>

<header>
  <svg width="32" height="32" viewBox="0 0 32 32">
    <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,.15)"/>
    <text x="16" y="22" text-anchor="middle" font-size="17" fill="#fff">📍</text>
  </svg>
  <div class="brand">
    <div class="title">San Francisco de Asís</div>
    <div class="sub">Villacolombia · Cali — Mapa Interior Primer Piso</div>
  </div>
  <div class="search-wrap">
    <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Buscar salón, baños, capilla…" autocomplete="off" spellcheck="false"/>
    <div id="sugs"></div>
  </div>
</header>

<div class="floor-bar">
  <span>Piso:</span>
  <button class="fbtn active" onclick="switchFloor(1)">1°</button>

// ─────────────────────────────────────────────────────
// A*
// ─────────────────────────────────────────────────────
function heur(a, b, Gx) {
  const na = Gx[a], nb = Gx[b];
  if (!na || !nb) return 0;
  return Math.hypot(na.x - nb.x, na.y - nb.y) / 100;
}
function findPath(start, end, Gx) {
  if (!Gx[start] || !Gx[end]) return null;
  const open = new Set([start]);
  const from = {};
  const g = { [start]: 0 };
  const f = { [start]: heur(start, end, Gx) };
  while (open.size) {
    let cur = [...open].reduce((a, b) => (f[a]??Infinity) < (f[b]??Infinity) ? a : b);
    if (cur === end) {
      const p = [];
      while (cur) { p.unshift(cur); cur = from[cur]; }
      return p;
    }
    open.delete(cur);
    for (const [nb, cost] of Object.entries(Gx[cur].nb)) {
      const tg = (g[cur]??0) + cost;
      if (tg < (g[nb]??Infinity)) {
        from[nb] = cur; g[nb] = tg; f[nb] = tg + heur(nb, end, Gx); open.add(nb);
      }
    }
  }
  return null;
}

  bano_m:       'Los baños de hombres están bajo el pasillo',
  enferm:       'La enfermería está a la izquierda pegada a la entrada',
  papel:        'La papelería está en la Plazoleta central',
  tienda:       'La tienda Punto Asís está en la Plazoleta central',
  escal_lud:    'Las escaleras al salón lúdico están en la Plazoleta',
  zona_prof:    'La Zona de Profesores está en el ala izquierda',
  entrada_parq: 'La entrada al parqueadero está sobre el pasillo',
  dona_pica_n:  'La tienda Doña Pica está bajo el pasillo, lado capilla',
  dona_pica:    'La tienda Doña Pica está bajo el pasillo, lado capilla',
};

function makeSteps(locId, path) {
  const { LOCS: curLOCS, startNode } = FLOORS[currentFloor];
  const loc = curLOCS[locId];
  const isF1 = currentFloor === 1;
  const startLabel = isF1 ? 'Entrada Principal' : 'Escaleras Generales (acceso al piso)';
  const startIcon  = isF1 ? '🚪' : '🪜';
  const steps = [];
  steps.push({ icon: startIcon, head:'Punto de inicio', body:`Comienza en la <strong>${startLabel}</strong>.`, type:'start' });

  for (let i = 1; i < path.length - 1; i++) {
    const n = path[i];
    if (SKIP_NODES.has(n)) continue;
    const loc2 = Object.values(curLOCS).find(l => {
      const nodeId = Object.entries(FLOORS[currentFloor].LOC_NODE).find(([,v]) => v === n)?.[0];
      return nodeId && curLOCS[nodeId] === l;
    });
    const name = loc2?.name || n;
    const dir  = FLOOR_DIRECTIONS[n] || `Pasas por <strong>${name}</strong>`;
    const iconMap = { classroom:'🏫', bathroom:'🚻', stairs:'🪜', elevator:'🛗', special:'⛪', service:'🛍️', sport:'⚽', play:'🛝', parking:'🚗', entrance:'🚪' };
    const icon = loc2 ? (iconMap[loc2.type] || '➡️') : '➡️';
    steps.push({ icon, head: dir, body:`<strong>${name}</strong>`, type:'mid' });
  }

  const destName = loc?.name || 'Destino';
  steps.push({ icon:'📍', head:'¡Llegaste!', body:`<strong>${destName}</strong>`, type:'dest' });
  return steps;
}

// ─────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────
function norm(s) { return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

function doSearch(q) {
  if (!q.trim()) return [];
  const nq = norm(q);
  return Object.entries(FLOORS[currentFloor].LOCS).filter(([,l]) =>
    l.terms.some(t => norm(t).includes(nq)) || norm(l.name).includes(nq)
  ).slice(0, 9);
}

function showSugs(res) {
  const el = document.getElementById('sugs');
  if (!res.length) { el.classList.remove('open'); el.innerHTML=''; return; }
  const badges = { entrance:'🚪', service:'🛍️', bathroom:'🚻', sport:'⚽', play:'🛝', special:'⛪', stairs:'🪜', elevator:'🛗', parking:'🚗' };
  el.innerHTML = res.map(([id,l]) => {
    const b = l.type==='classroom' ? (l.name.match(/\d+/)?.[0]||'•') : (badges[l.type]||'•');
    return `<div class="si" onclick="navigateTo('${id}')"><span class="si-badge">${b}</span>${l.name}</div>`;
  }).join('');
  el.classList.add('open');
}

function clearAll() {
  document.querySelectorAll('.highlight').forEach(e => e.classList.remove('highlight'));
  [1,2,3].forEach(f => { const rl = document.getElementById(FLOORS[f].routeId); if (rl) rl.innerHTML = ''; });
}

function drawRoute(path) {
  const { G: Gx, routeId } = FLOORS[currentFloor];
  const layer = document.getElementById(routeId);
  layer.innerHTML = '';
  const pts = path.map(n => Gx[n] ? `${Gx[n].x},${Gx[n].y}` : '').filter(Boolean).join(' ');
  const line = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  line.setAttribute('points', pts); line.setAttribute('class','route-line');
  layer.appendChild(line);
  const sn = Gx[path[0]];
  if (sn) {
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', sn.x); c.setAttribute('cy', sn.y); c.setAttribute('r','9'); c.setAttribute('class','m-start');
    layer.appendChild(c);
  }
  const en = Gx[path.at(-1)];
  if (en) {
    const p = document.createElementNS('http://www.w3.org/2000/svg','circle');
    p.setAttribute('cx', en.x); p.setAttribute('cy', en.y); p.setAttribute('r','11'); p.setAttribute('class','m-pulse');
    layer.appendChild(p);
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', en.x); c.setAttribute('cy', en.y); c.setAttribute('r','9'); c.setAttribute('class','m-end');
    layer.appendChild(c);
  }
}

function navigateTo(locId) {
  const { LOCS: curLOCS, G: Gx, LOC_NODE: curLN, startNode } = FLOORS[currentFloor];
  const loc = curLOCS[locId];
  if (!loc) return;
  document.getElementById('sugs').classList.remove('open');
  document.getElementById('search').value = loc.name;
  clearAll();
  if (loc.svgId) { const el = document.getElementById(loc.svgId); if (el) el.classList.add('highlight'); }

  const endNode = curLN[locId];
  if (!endNode) return;
  const path = findPath(startNode, endNode, Gx);
  if (!path) return;
  drawRoute(path);

  const steps = makeSteps(locId, path);
  const typeLabels = { classroom:'Salón de clases', bathroom:'Baños', special:'Especial', service:'Servicio', stairs:'Escaleras', elevator:'Ascensor', sport:'Deporte', play:'Zona recreativa', entrance:'Acceso principal', parking:'Parqueo' };
  document.getElementById('sb-body').innerHTML = `
    <div style="background:#E3F2FD;border-radius:8px;padding:10px 12px;margin-bottom:14px;">
      <div style="font-size:12px;color:#1565C0;font-weight:700;">${loc.name}</div>
      <div style="font-size:11px;color:#42A5F5;margin-top:2px;">${typeLabels[loc.type]||''}</div>
    </div>
    ${steps.map((s,i) => `
      <div class="step">
        <div class="snum ${s.type}">${s.icon}</div>
        <div class="sbody"><strong>${s.head}</strong>${s.body}</div>
      </div>
      ${i<steps.length-1?'<div class="sdiv"></div>':''}
    `).join('')}`;

  const pw = document.getElementById('photo-wrap');
  const pi = document.getElementById('photo-img');
  if (loc.photo) {
    pw.style.display = 'block'; pi.src = loc.photo; pi.alt = loc.name;
    pi.onerror = () => { pw.style.display = 'none'; };
  } else pw.style.display = 'none';
}

function switchFloor(n) {
  currentFloor = n;
  [1,2,3].forEach(f => {
    const svg = document.getElementById(FLOORS[f].svgId);
    if (svg) svg.classList.toggle('active', f === n);
  });
  document.querySelectorAll('.fbtn').forEach((btn, i) => btn.classList.toggle('active', i + 1 === n));
  clearAll();
  document.getElementById('search').value = '';
  document.getElementById('sugs').classList.remove('open');
  document.getElementById('sb-body').innerHTML = '<p class="empty">Busca un salón o toca cualquier lugar del mapa para ver las instrucciones de llegada.</p>';
  document.getElementById('photo-wrap').style.display = 'none';
  const names = {1:'Primer Piso', 2:'Segundo Piso', 3:'Tercer Piso'};
  document.querySelector('.brand .sub').textContent = `Villacolombia · Cali — Mapa Interior ${names[n]}`;
}

document.getElementById('search').addEventListener('input', e => showSugs(doSearch(e.target.value)));
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key==='Escape') document.getElementById('sugs').classList.remove('open');
  if (e.key==='Enter') { const r=doSearch(e.target.value); if(r.length) navigateTo(r[0][0]); }
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) document.getElementById('sugs').classList.remove('open');
});
</script>
</body>
