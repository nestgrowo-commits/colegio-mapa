    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0f; color: #fff;
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: #1565C0; color: #fff;
      padding: 10px 18px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.6); z-index: 30; flex-shrink: 0;
    }
    .brand .title { font-size: 17px; font-weight: 700; }
    .brand .sub   { font-size: 11px; opacity: .78; margin-top: 1px; }

    /* Search */
    .search-wrap { position: relative; flex: 1; max-width: 420px; margin-left: auto; }
    .s-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; pointer-events: none; opacity: .65; }
    #search {
      width: 100%; padding: 9px 14px 9px 35px;
      border-radius: 22px; border: none; font-size: 14px; outline: none;
      background: rgba(255,255,255,.18); color: #fff; transition: background .2s;
    }
    #search::placeholder { color: rgba(255,255,255,.55); }
    #search:focus { background: #fff; color: #212121; }
    #sugs {
      display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #fff; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,.4);
      overflow: hidden; z-index: 200;
    }
    #sugs.open { display: block; }
    .si { padding: 11px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: #222; border-bottom: 1px solid #f0f0f0; }
    .si:last-child { border-bottom: none; }
    .si:hover { background: #E3F2FD; }
    .si-badge { background: #1565C0; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; min-width: 32px; text-align: center; }

    /* ── FLOOR BAR ── */
    .floor-bar {
      background: rgba(15,15,25,.85); backdrop-filter: blur(10px);
      padding: 7px 16px; display: flex; gap: 8px; align-items: center; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .floor-bar span { font-size: 12px; color: rgba(255,255,255,.5); margin-right: 2px; }
    .fbtn {
      padding: 4px 15px; border-radius: 18px; border: 2px solid rgba(255,255,255,.3);
      color: rgba(255,255,255,.7); font-weight: 600; font-size: 12px; cursor: pointer;
      background: transparent; text-decoration: none; display: inline-block; line-height: 1.4;
    }
    .fbtn.active { background: #1565C0; border-color: #1565C0; color: #fff; }
    .fbtn:hover:not(.active):not([disabled]) { background: rgba(255,255,255,.12); }
    .fbtn[disabled] { opacity: .3; cursor: default; }

    /* ── MAIN LAYOUT ── */
    .main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── PHOTO VIEWER ── */
    #viewer {
      flex: 1; position: relative; overflow: hidden; background: #000;
    }
    #photo-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity .3s ease;
    }
    #photo-img.fade { opacity: 0; }

    /* ── LOCATION CHIP ── */
    #loc-chip {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.7); backdrop-filter: blur(10px);
      color: #fff; padding: 8px 20px; border-radius: 24px;
      font-size: 13.5px; font-weight: 600; white-space: nowrap;
      pointer-events: none; z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
      display: flex; align-items: center; gap: 8px;
      max-width: calc(100% - 40px); overflow: hidden; text-overflow: ellipsis;
    }

    /* ── ROUTE PROGRESS ── */
    #route-strip {
      position: absolute; top: 62px; left: 50%; transform: translateX(-50%);
      background: rgba(21,101,192,.88); backdrop-filter: blur(10px);
      color: #fff; padding: 6px 16px; border-radius: 14px;
      font-size: 11.5px; font-weight: 600;
      display: none; align-items: center; gap: 10px;
      z-index: 10; white-space: nowrap;
      box-shadow: 0 2px 10px rgba(0,0,0,.3);
    }
    #route-strip.on { display: flex; }
    #progress-bar-wrap {
      width: 120px; height: 5px; background: rgba(255,255,255,.25); border-radius: 3px; overflow: hidden;
    }
    #progress-bar-fill { height: 100%; background: #fff; border-radius: 3px; transition: width .4s ease; }

    /* ── NAV BUTTONS ── */
    .nav-btn {
      position: absolute; z-index: 15;
      background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,255,255,.28); color: #fff;
      border-radius: 14px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 12px 18px;
      transition: background .15s, border-color .15s;
      font-size: 11px; font-weight: 600; letter-spacing: .3px;
      opacity: 0; pointer-events: none;
    }
    .nav-btn.on { opacity: 1; pointer-events: all; }
    .nav-btn:hover { background: rgba(21,101,192,.75); border-color: rgba(255,255,255,.6); }
    .nav-btn:active { transform: scale(.95) !important; }
    .nav-btn svg { width: 22px; height: 22px; }

    #btn-fwd  { bottom: 90px; left: 50%; transform: translateX(-50%); }
    #btn-fwd:hover  { transform: translateX(-50%) !important; }
    #btn-back { bottom: 18px; left: 50%; transform: translateX(-50%); padding: 9px 16px; }
    #btn-back:hover { transform: translateX(-50%) !important; }
    #btn-right { right: 20px; top: 50%; transform: translateY(-50%); }
    #btn-right:hover { transform: translateY(-50%) !important; }
    #btn-left  { left: 20px;  top: 50%; transform: translateY(-50%); }
    #btn-left:hover  { transform: translateY(-50%) !important; }

    /* Autoplay */
    #btn-auto {
      position: absolute; bottom: 18px; right: 18px; z-index: 15;
      background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,255,255,.28); color: #fff;
      border-radius: 10px; cursor: pointer; padding: 8px 14px;
      font-size: 12px; font-weight: 600;
      transition: background .15s;
    }
    #btn-auto:hover { background: rgba(21,101,192,.75); }
    #btn-auto.playing { border-color: #E53935; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 285px; background: #12121e;
      border-left: 1px solid rgba(255,255,255,.07);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sb-head {
      background: #1565C0; color: #fff;
      padding: 12px 16px; font-weight: 600; font-size: 14px; flex-shrink: 0;
    }
    .sb-body { flex: 1; overflow-y: auto; padding: 12px; }
    .empty { color: rgba(255,255,255,.35); font-size: 13px; text-align: center; margin-top: 36px; line-height: 1.7; }

    .rstep {
      display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start;
      padding: 10px 12px; border-radius: 10px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .rstep:hover { background: rgba(255,255,255,.09); }
    .rstep.active { background: rgba(21,101,192,.35); border-color: rgba(21,101,192,.7); }
    .rsnum {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: rgba(255,255,255,.12); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }
    .rsnum.s { background: #43A047; }
    .rsnum.d { background: #E53935; }
    .rsbody { font-size: 12px; line-height: 1.45; color: rgba(255,255,255,.7); padding-top: 3px; }
    .rsbody strong { color: #fff; display: block; font-size: 12.5px; margin-bottom: 2px; }

    /* Desc chip at bottom of photo */
    #desc-chip {
      position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.65); backdrop-filter: blur(8px);
      color: rgba(255,255,255,.8); padding: 6px 16px; border-radius: 12px;
      font-size: 12px; white-space: nowrap; pointer-events: none; z-index: 10;
      max-width: calc(100% - 200px); overflow: hidden; text-overflow: ellipsis;
      opacity: 0; transition: opacity .3s;
    }
    #desc-chip.show { opacity: 1; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      #btn-right, #btn-left { top: auto; bottom: 100px; }
    }
  </style>
</head>

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const BASE = 'fotos-3/';
let cur = 'h_start';
let route = null;      // active route node-id array
let autoTimer = null;
let playing = false;

// ═══════════════════════════════════════════════════════
// CORE: navigate to a node
// ═══════════════════════════════════════════════════════
function goTo(nodeId) {
  if (!G[nodeId]) return;
  cur = nodeId;
  const n = G[nodeId];

  // Fade photo
  const img = document.getElementById('photo-img');
  img.classList.add('fade');
  setTimeout(() => {
    img.src = BASE + n.file;
    img.alt = n.label;
    img.classList.remove('fade');
  }, 150);

  // Location chip
  document.getElementById('loc-icon').textContent = n.icon || '📍';
  document.getElementById('loc-text').textContent = n.label;

  // Desc chip (brief)
  const dc = document.getElementById('desc-chip');
  dc.textContent = n.desc || '';
  dc.classList.add('show');
  clearTimeout(dc._t);
  dc._t = setTimeout(() => dc.classList.remove('show'), 4000);

  // Nav buttons
  refreshButtons(n);

  // Route progress
  if (route) updateProgress(nodeId);

  // Sidebar highlight
  document.querySelectorAll('.rstep').forEach(el => el.classList.remove('active'));
  const step = document.getElementById('rs-' + nodeId);
  if (step) { step.classList.add('active'); step.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
}

function go(dir) {
  const node = G[cur];
  if (node && node[dir]) goTo(node[dir]);
}

function refreshButtons(n) {
  const cfg = {
    'btn-fwd':   { has: !!n.forward,  label: n.forwardLabel  || 'Avanzar',  id:'lbl-fwd'   },
    'btn-back':  { has: !!n.back,     label: n.backLabel     || 'Regresar', id:'lbl-back'  },
    'btn-right': { has: !!n.right,    label: n.rightLabel    || 'Entrar',   id:'lbl-right' },
    'btn-left':  { has: !!n.left,     label: n.leftLabel     || 'Salir',    id:'lbl-left'  },
  };
  Object.entries(cfg).forEach(([btnId, c]) => {
    const btn = document.getElementById(btnId);
    btn.classList.toggle('on', c.has);
    const lbl = document.getElementById(c.id);
    if (lbl) lbl.textContent = c.label;
  });
}

// ═══════════════════════════════════════════════════════
// ROUTE MODE
// ═══════════════════════════════════════════════════════
function startRoute(roomId) {
  const rm = ROOMS[roomId];
  if (!rm) return;
  route = rm.route;

  // Route strip
  document.getElementById('route-label').textContent = '→ ' + rm.name;
  document.getElementById('route-strip').classList.add('on');
  updateProgress('h_start');

  // Sidebar
  buildSidebar(rm);

  // Go to start
  goTo('h_start');
}

function updateProgress(nodeId) {
  if (!route) return;
  const pos = route.indexOf(nodeId);
  if (pos === -1) return;
  const pct = Math.round((pos / (route.length - 1)) * 100);
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('route-pct').textContent = pct + '%';
}

function buildSidebar(rm) {
  const sb = document.getElementById('sb-body');
  sb.innerHTML = `
    <div style="background:#1565C0;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px;">
      ${rm.icon} Ruta hacia ${rm.name}
    </div>
    ${rm.route.map((nid, i) => {
      const n = G[nid];
      if (!n) return '';
      const isS = i === 0, isD = i === rm.route.length - 1;
      return `
        <div class="rstep" id="rs-${nid}" onclick="goTo('${nid}')">
          <div class="rsnum ${isS?'s':isD?'d':''}">${isS?'🪜':isD?'📍':(n.icon||'➡️')}</div>
          <div class="rsbody">
            <strong>${n.label}</strong>
            ${n.desc}
          </div>
        </div>`;
    }).join('')}`;
}

// ═══════════════════════════════════════════════════════
// AUTOPLAY
// ═══════════════════════════════════════════════════════
function toggleAuto() {
  playing ? stopAuto() : startAuto();
}
function startAuto() {
  playing = true;
  document.getElementById('btn-auto').textContent = '⏸ Pausar';
  document.getElementById('btn-auto').classList.add('playing');
  tick();
}
function stopAuto() {
  playing = false;
  clearTimeout(autoTimer);
  document.getElementById('btn-auto').textContent = '▶ Auto';
  document.getElementById('btn-auto').classList.remove('playing');
}
function tick() {
  if (!playing) return;
  if (route) {
    const pos = route.indexOf(cur);
    if (pos !== -1 && pos < route.length - 1) {
      goTo(route[pos + 1]);
      autoTimer = setTimeout(tick, 2400);
    } else { stopAuto(); }
  } else {
    const next = G[cur]?.forward;
    if (next) { goTo(next); autoTimer = setTimeout(tick, 2400); }
    else { stopAuto(); }
  }
}

// ═══════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════
const norm = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');

function doSearch(q) {
  if (!q.trim()) return [];
  const nq = norm(q);
  return Object.entries(ROOMS).filter(([,r]) =>
    norm(r.name).includes(nq) || r.terms.some(t => norm(t).includes(nq))
  ).slice(0, 8);
}

function showSugs(res) {
  const el = document.getElementById('sugs');
  if (!res.length) { el.classList.remove('open'); return; }
  el.innerHTML = res.map(([id,r]) =>
    `<div class="si" onclick="pick('${id}')"><span class="si-badge">${r.icon}</span>${r.name}</div>`
  ).join('');
  el.classList.add('open');
}

function pick(roomId) {
  const rm = ROOMS[roomId];
  if (!rm) return;
  document.getElementById('sugs').classList.remove('open');
  document.getElementById('search').value = rm.name;
  stopAuto();
  startRoute(roomId);
  startAuto();
}

document.getElementById('search').addEventListener('input', e => showSugs(doSearch(e.target.value)));
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('sugs').classList.remove('open');
  if (e.key === 'Enter') { const r = doSearch(e.target.value); if (r.length) pick(r[0][0]); }
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) document.getElementById('sugs').classList.remove('open');
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const map = { ArrowUp:'forward', ArrowDown:'back', ArrowRight:'right', ArrowLeft:'left' };
  if (map[e.key]) { e.preventDefault(); go(map[e.key]); }
  if (e.key === ' ') { e.preventDefault(); toggleAuto(); }
});

// Init
goTo('h_start');
</script>
